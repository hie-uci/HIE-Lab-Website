name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies 📦
        run: npm install

      - name: Build with Next.js 🏗️
        run: npm run build

      - name: Deploy to Pages Repo 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          repository-name: hie-uci/hie-uci.github.io
          branch: main
          token: ${{ secrets.GITHUB_TOKEN }}
          force: true